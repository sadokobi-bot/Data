<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניתוח מניות - פאנל ניהול</title>
    <!-- טעינת Tailwind CSS מ-CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        finance: {
                            900: '#0B1120',
                            800: '#0F172A',
                            700: '#1E293B',
                            600: '#1E3A5F',
                            500: '#1D4ED8',
                            400: '#3B82F6',
                            300: '#60A5FA',
                            accent: '#06B6D4',
                        }
                    }
                }
            }
        }
    </script>
    <!-- טעינת פונט Heebo מ-Fontsource -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/heebo@5.0.19/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fira-code@5.0.19/index.css" />
    <style>
        /* אנימציות מותאמות אישית */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(6, 182, 212, 0.3); }
            50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animateFadeInUp {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .animateSlideDown {
            animation: slideDown 0.4s ease-out forwards;
        }
        .animatePulseGlow {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        /* סגנון סקרולבר מותאם */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        /* מעבר חלק לכל האלמנטים האינטראקטיביים */
        .btnTransition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .inputTransition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-finance-900 text-slate-200 font-sans min-h-screen">
    <!-- רקע עם גרדיאנט עדין -->
    <div class="fixed inset-0 bg-gradient-to-br from-finance-900 via-finance-800 to-slate-900 pointer-events-none"></div>
    <!-- אלמנטים דקורטיביים ברקע -->
    <div class="fixed top-0 left-0 w-96 h-96 bg-finance-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-finance-accent/5 rounded-full blur-3xl pointer-events-none"></div>

    <!-- תוכן ראשי -->
    <div class="relative z-10 max-w-2xl mx-auto px-4 py-8 sm:py-12">

        <!-- כותרת עליונה עם לוגו -->
        <header class="text-center mb-10 animateFadeInUp">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-finance-600/30 border border-finance-500/20 mb-4">
                <svg class="w-8 h-8 text-finance-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            </div>
            <h1 class="text-3xl sm:text-4xl font-bold text-white tracking-tight">
                ניתוח מניות
            </h1>
            <p class="text-slate-400 mt-2 text-sm sm:text-base">
                הזן סימולי מניות, בחר תאריכים ותדירות — וקבל דוח מלא
            </p>
        </header>

        <!-- טופס ראשי -->
        <main id="formSection" class="animateFadeInUp" style="animation-delay: 0.15s; animation-fill-mode: both;">
            <form id="stockForm" class="bg-finance-800/60 backdrop-blur-sm rounded-2xl border border-slate-700/50 shadow-2xl shadow-black/20 p-6 sm:p-8 space-y-6">

                <!-- שדה סימולי מניות -->
                <div>
                    <label for="symbols" class="block text-sm font-semibold text-slate-300 mb-2">
                        סימולי מניות
                    </label>
                    <div class="relative">
                        <input
                            type="text"
                            id="symbols"
                            name="symbols"
                            placeholder="לדוגמה: TSLA, AAPL, AMZN, GOOGL"
                            required
                            class="inputTransition w-full px-4 py-3.5 bg-finance-700/50 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-finance-accent/50 focus:border-finance-accent font-mono text-sm tracking-wide"
                        >
                        <!-- אייקון מניות -->
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">הפרד בין סימולים בפסיק</p>
                </div>

                <!-- שדות תאריכים ותדירות בשורה אחת -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <!-- תאריך התחלה -->
                    <div>
                        <label for="startDate" class="block text-sm font-semibold text-slate-300 mb-2">
                            תאריך התחלה
                        </label>
                        <input
                            type="date"
                            id="startDate"
                            name="startDate"
                            required
                            class="inputTransition w-full px-4 py-3.5 bg-finance-700/50 border border-slate-600/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/50 focus:border-finance-accent text-sm"
                        >
                    </div>
                    <!-- תאריך סיום -->
                    <div>
                        <label for="endDate" class="block text-sm font-semibold text-slate-300 mb-2">
                            תאריך סיום
                        </label>
                        <input
                            type="date"
                            id="endDate"
                            name="endDate"
                            required
                            class="inputTransition w-full px-4 py-3.5 bg-finance-700/50 border border-slate-600/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/50 focus:border-finance-accent text-sm"
                        >
                    </div>
                    <!-- תדירות -->
                    <div>
                        <label for="frequency" class="block text-sm font-semibold text-slate-300 mb-2">
                            תדירות
                        </label>
                        <select
                            id="frequency"
                            name="frequency"
                            class="inputTransition w-full px-4 py-3.5 bg-finance-700/50 border border-slate-600/50 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/50 focus:border-finance-accent text-sm appearance-none cursor-pointer"
                        >
                            <option value="Daily">יומי (Daily)</option>
                            <option value="Weekly">שבועי (Weekly)</option>
                            <option value="Monthly">חודשי (Monthly)</option>
                        </select>
                    </div>
                </div>

                <!-- כפתור שליחה -->
                <button
                    type="submit"
                    id="submitBtn"
                    class="btnTransition w-full py-4 px-6 bg-gradient-to-l from-finance-accent to-finance-400 hover:from-finance-400 hover:to-finance-accent text-finance-900 font-bold text-base rounded-xl shadow-lg shadow-finance-accent/20 hover:shadow-finance-accent/30 focus:outline-none focus:ring-2 focus:ring-finance-accent focus:ring-offset-2 focus:ring-offset-finance-800 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
                >
                    <!-- אייקון שליחה -->
                    <svg id="submitIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    <!-- ספינר טעינה (מוסתר כברירת מחדל) -->
                    <svg id="loadingSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="submitText">שלח ובקש ניתוח</span>
                </button>
            </form>

            <!-- הודעת שגיאה (מוסברת כברירת מחדל) -->
            <div id="errorSection" class="hidden mt-4 animateSlideDown">
                <div class="bg-red-900/20 border border-red-500/30 rounded-xl p-4 flex items-start gap-3">
                    <svg class="w-5 h-5 text-red-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                    <div>
                        <p id="errorMessage" class="text-red-300 text-sm font-medium"></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- אזור הצלחה - מוצג לאחר קבלת תשובה מהשרת -->
        <section id="successSection" class="hidden animateFadeInUp mt-8">
            <div class="bg-finance-800/60 backdrop-blur-sm rounded-2xl border border-emerald-500/20 shadow-2xl shadow-emerald-500/5 p-6 sm:p-8 text-center space-y-5">
                <!-- אייקון הצלחה -->
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                    <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white">הניתוח הושלם בהצלחה!</h2>
                <p class="text-slate-400 text-sm">הדוח שלך מוכן לצפייה. לחץ על הכפתור למטה כדי לפתוח אותו.</p>

                <!-- כפתור פתיחת גיליון -->
                <a
                    id="openSheetBtn"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="btnTransition block w-full py-4 px-6 bg-gradient-to-l from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold text-lg rounded-xl shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/30 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2 focus:ring-offset-finance-800 animatePulseGlow"
                >
                    <span class="flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        פתח את הדוח
                    </span>
                </a>

                <!-- כפתור חזרה לטופס -->
                <button
                    id="resetBtn"
                    type="button"
                    class="btnTransition inline-flex items-center gap-2 text-slate-400 hover:text-white text-sm font-medium focus:outline-none"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    בקשה חדשה
                </button>
            </div>
        </section>

        <!-- פוטר -->
        <footer class="mt-12 text-center text-slate-600 text-xs animateFadeInUp" style="animation-delay: 0.3s; animation-fill-mode: both;">
            <p>מבוסס על נתוני שוק בזמן אמת • כל הזכויות שמורות © 2024</p>
        </footer>
    </div>

    <script>
        // ============================================
        // הגדרות - כתובת ה-Web App של Google Apps Script
        // ============================================
        /** כתובת ה-Web App שאליה תישלח הבקשה */
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxLk-n2zJoJA4aG7RTXQMO_8yNMcVaVqBuXs5UhWeWEjhbqFk9bChTnxCt1cmXm2h6FHg/exec';

        // ============================================
        // אתחול תאריכים ברירת מחדל
        // ============================================
        (function initializeDefaultDates() {
            var today = new Date();
            var oneYearAgo = new Date(today);
            oneYearAgo.setFullYear(today.getFullYear() - 1);

            // המרה לפורמט YYYY-MM-DD
            var formatDate = function(dateObj) {
                return dateObj.toISOString().split('T')[0];
            };

            document.getElementById('startDate').value = formatDate(oneYearAgo);
            document.getElementById('endDate').value = formatDate(today);
        })();

        // ============================================
        // טיפול בשליחת הטופס
        // ============================================
        document.getElementById('stockForm').addEventListener('submit', async function(event) {
            // מניעת שליחה רגילה של הטופס
            event.preventDefault();

            // אחזור האלמנטים הנדרשים
            var submitBtn = document.getElementById('submitBtn');
            var submitText = document.getElementById('submitText');
            var submitIcon = document.getElementById('submitIcon');
            var loadingSpinner = document.getElementById('loadingSpinner');
            var errorSection = document.getElementById('errorSection');
            var errorMessage = document.getElementById('errorMessage');
            var successSection = document.getElementById('successSection');
            var formSection = document.getElementById('formSection');

            // איפוס הודעות שגיאה קודמות
            errorSection.classList.add('hidden');
            successSection.classList.add('hidden');

            // איסוף הנתונים מהטופס
            var formData = {
                symbols: document.getElementById('symbols').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value,
            };

            // ולידציה בסיסית
            if (!formData.symbols) {
                showError('אנא הזן לפחות סימול מניה אחד');
                return;
            }

            // מעבר למצב טעינה - נעילת הכפתור והצגת ספינר
            submitBtn.disabled = true;
            submitText.textContent = 'טוען נתונים...';
            submitIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            try {
                // שליחת הבקשה בשיטת POST לשרת
                // הגדרת ה-Header כ-text/plain;charset=utf-8 למניעת שגיאות CORS
                var response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(formData),
                });

                // בדיקה אם התשובה תקינה
                if (!response.ok) {
                    throw new Error('שגיאת שרת: ' + response.status + ' ' + response.statusText);
                }

                // עיבוד התשובה מהשרת
                var data = await response.json();

                // שליפת כתובת הגיליון מהתשובה
                var sheetUrl = data.sheetUrl || data.url || '';

                if (!sheetUrl) {
                    throw new Error('לא התקבלה כתובת גיליון מהשרת');
                }

                // עדכון הכפתור עם הלינק
                var openSheetBtn = document.getElementById('openSheetBtn');
                openSheetBtn.href = sheetUrl;

                // הצגת אזור ההצלחה והסתרת הטופס
                formSection.classList.add('hidden');
                successSection.classList.remove('hidden');

            } catch (error) {
                // הצגת הודעת שגיאה במקרה של כשל
                showError('התרחשה שגיאה: ' + error.message);
                console.error('Error during fetch:', error);
            } finally {
                // חזרה למצב רגיל של הכפתור (בין אם הצליח או נכשל)
                submitBtn.disabled = false;
                submitText.textContent = 'שלח ובקש ניתוח';
                submitIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }

            // ============================================
            // פונקציית הצגת שגיאה
            // ============================================
            function showError(msg) {
                errorMessage.textContent = msg;
                errorSection.classList.remove('hidden');
            }
        });

        // ============================================
        // כפתור איפוס - חזרה לטופס
        // ============================================
        document.getElementById('resetBtn').addEventListener('click', function() {
            var formSection = document.getElementById('formSection');
            var successSection = document.getElementById('successSection');

            // הסתרת אזור ההצלחה והצגת הטופס מחדש
            successSection.classList.add('hidden');
            formSection.classList.remove('hidden');

            // רענון אנימציה
            formSection.style.animation = 'none';
            formSection.offsetHeight; // Trigger reflow
            formSection.style.animation = 'fadeInUp 0.5s ease-out forwards';
        });

        // ============================================
        // פיצ'ר נוסף: ולידציה בזמן אמת לסימולים
        // ============================================
        document.getElementById('symbols').addEventListener('input', function() {
            // המרה אוטומטית לאותיות גדולות (נהוג בסימולי מניות)
            this.value = this.value.toUpperCase();
        });
    </script>
</body>
</html>
