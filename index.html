<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניתוח מניות - פאנל ניהול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        finance: {
                            900: '#060B14',
                            800: '#0A1222',
                            700: '#14213D',
                            600: '#1E3A5F',
                            500: '#1D4ED8',
                            400: '#3B82F6',
                            300: '#60A5FA',
                            accent: '#00F0FF',
                        }
                    },
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/heebo@5.0.19/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fira-code@5.0.19/index.css" />
    <style>
        /* אנימציות כניסה */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
            50% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.7); }
        }
        
        .animateFadeInUp {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animateSlideDown {
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animatePulseGlow {
            animation: pulseGlow 2.5s ease-in-out infinite;
        }
        
        /* עיכובי אנימציה מותאמים ל-Blobs */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* סגנון סקרולבר מותאם */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A1222; }
        ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3B82F6; }

        /* כוונון מעברים */
        .inputTransition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* בחירת טקסט מעוצבת */
        ::selection {
            background-color: #00F0FF;
            color: #060B14;
        }
    </style>
</head>
<body class="bg-finance-900 text-slate-200 font-sans min-h-screen overflow-x-hidden selection:bg-finance-accent selection:text-finance-900">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 -left-10 w-96 h-96 bg-finance-500/20 rounded-full mix-blend-screen filter blur-[80px] opacity-70 animate-blob"></div>
        <div class="absolute top-20 -right-10 w-96 h-96 bg-finance-accent/20 rounded-full mix-blend-screen filter blur-[80px] opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-20 left-40 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-screen filter blur-[80px] opacity-60 animate-blob animation-delay-4000"></div>
    </div>

    <div class="relative z-10 max-w-2xl mx-auto px-4 py-12 sm:py-16">

        <header class="text-center mb-12 animateFadeInUp">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-finance-700/80 to-finance-800/80 backdrop-blur-md border border-finance-500/30 shadow-[0_0_30px_rgba(29,78,216,0.3)] mb-6 transform transition-transform hover:scale-110 duration-500">
                <svg class="w-10 h-10 text-finance-accent drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-slate-400 tracking-tight">
                ניתוח מניות מתקדם
            </h1>
            <p class="text-slate-400 mt-4 text-sm sm:text-base max-w-md mx-auto leading-relaxed">
                הזן סימולי מניות, בחר טווח תאריכים ותדירות, והמערכת תייצר עבורך דוח נתונים כרונולוגי מקיף.
            </p>
        </header>

        <main id="formSection" class="animateFadeInUp" style="animation-delay: 0.1s; animation-fill-mode: both;">
            <form id="stockForm" class="bg-finance-800/40 backdrop-blur-xl rounded-3xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.5)] p-6 sm:p-10 space-y-8 relative overflow-hidden group">
                
                <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000 pointer-events-none"></div>

                <div class="relative z-10">
                    <label for="symbols" class="block text-sm font-semibold text-slate-300 mb-2 tracking-wide">
                        סימולי מניות
                    </label>
                    <div class="relative">
                        <input
                            type="text"
                            id="symbols"
                            name="symbols"
                            placeholder="לדוגמה: TSLA, AAPL, AMZN"
                            required
                            class="inputTransition w-full px-5 py-4 bg-finance-900/50 border border-slate-600/50 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-finance-accent/60 focus:border-finance-accent font-mono text-base tracking-wider hover:bg-finance-900/70 shadow-inner"
                        >
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-finance-accent/70">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2 font-medium">יש להפריד בין הסימולים באמצעות פסיק (,)</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 relative z-10">
                    <div class="group/input">
                        <label for="startDate" class="block text-sm font-semibold text-slate-300 mb-2 tracking-wide group-hover/input:text-white transition-colors">
                            תאריך התחלה
                        </label>
                        <input
                            type="date"
                            id="startDate"
                            name="startDate"
                            required
                            class="inputTransition w-full px-4 py-3.5 bg-finance-900/50 border border-slate-600/50 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/60 focus:border-finance-accent text-sm hover:bg-finance-900/70 [color-scheme:dark]"
                        >
                    </div>
                    <div class="group/input">
                        <label for="endDate" class="block text-sm font-semibold text-slate-300 mb-2 tracking-wide group-hover/input:text-white transition-colors">
                            תאריך סיום
                        </label>
                        <input
                            type="date"
                            id="endDate"
                            name="endDate"
                            required
                            class="inputTransition w-full px-4 py-3.5 bg-finance-900/50 border border-slate-600/50 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/60 focus:border-finance-accent text-sm hover:bg-finance-900/70 [color-scheme:dark]"
                        >
                    </div>
                    <div class="group/input">
                        <label for="frequency" class="block text-sm font-semibold text-slate-300 mb-2 tracking-wide group-hover/input:text-white transition-colors">
                            תדירות
                        </label>
                        <select
                            id="frequency"
                            name="frequency"
                            class="inputTransition w-full px-4 py-3.5 bg-finance-900/50 border border-slate-600/50 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/60 focus:border-finance-accent text-sm appearance-none cursor-pointer hover:bg-finance-900/70"
                        >
                            <option value="1d">יומי (Daily)</option>
                            <option value="1wk">שבועי (Weekly)</option>
                            <option value="1mo">חודשי (Monthly)</option>
                        </select>
                    </div>
                </div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="relative z-10 w-full py-4 px-6 bg-gradient-to-r from-finance-500 via-finance-400 to-finance-accent text-finance-900 font-extrabold text-lg rounded-2xl shadow-[0_0_20px_rgba(0,240,255,0.3)] hover:shadow-[0_0_35px_rgba(0,240,255,0.5)] transform hover:-translate-y-1 hover:scale-[1.02] active:scale-95 active:translate-y-0 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-finance-accent/30 disabled:opacity-70 disabled:cursor-wait disabled:hover:transform-none overflow-hidden group/btn"
                >
                    <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full group-hover/btn:animate-[shimmer_1.5s_infinite]"></div>
                    
                    <div class="relative flex items-center justify-center gap-3">
                        <svg id="submitIcon" class="w-6 h-6 transition-transform group-hover/btn:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
                        </svg>
                        
                        <svg id="loadingSpinner" class="hidden w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="submitText">התחל ניתוח נתונים</span>
                    </div>
                </button>
            </form>

            <div id="errorSection" class="hidden mt-6 animateSlideDown">
                <div class="bg-red-950/50 backdrop-blur-md border border-red-500/40 rounded-2xl p-4 flex items-center gap-4 shadow-[0_0_20px_rgba(239,68,68,0.15)]">
                    <div class="bg-red-500/20 p-2 rounded-full flex-shrink-0">
                        <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                        </svg>
                    </div>
                    <div>
                        <p id="errorMessage" class="text-red-200 text-sm font-medium leading-snug"></p>
                    </div>
                </div>
            </div>
        </main>

        <section id="successSection" class="hidden animateFadeInUp mt-8">
            <div class="bg-finance-800/40 backdrop-blur-xl rounded-3xl border border-emerald-500/30 shadow-[0_0_40px_rgba(16,185,129,0.15)] p-8 sm:p-12 text-center space-y-6 relative overflow-hidden">
                
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-emerald-500/10 blur-3xl rounded-full pointer-events-none"></div>

                <div class="relative inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400/20 to-emerald-600/20 border border-emerald-400/40 shadow-[0_0_20px_rgba(52,211,153,0.3)] mx-auto animatePulseGlow">
                    <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                
                <div>
                    <h2 class="text-2xl font-bold text-white mb-2">הדוח שלך מוכן!</h2>
                    <p class="text-slate-400 text-base">הנתונים נמשכו, מוזגו וסודרו בהצלחה בגיליון חכם.</p>
                </div>

                <a
                    id="openSheetBtn"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="block w-full py-4 px-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-finance-900 font-extrabold text-lg rounded-2xl shadow-[0_0_20px_rgba(52,211,153,0.4)] hover:shadow-[0_0_35px_rgba(52,211,153,0.6)] transform hover:-translate-y-1 hover:scale-[1.02] active:scale-95 transition-all duration-300 focus:outline-none group"
                >
                    <span class="flex items-center justify-center gap-3">
                        <svg class="w-6 h-6 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                        פתח את הדוח ב-Google Sheets
                    </span>
                </a>

                <div class="pt-4 border-t border-white/5">
                    <button
                        id="resetBtn"
                        type="button"
                        class="inline-flex items-center gap-2 text-slate-400 hover:text-white text-sm font-semibold focus:outline-none transition-colors group"
                    >
                        <svg class="w-4 h-4 transition-transform group-hover:-rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        התחל בקשה חדשה
                    </button>
                </div>
            </div>
        </section>

        <footer class="mt-16 text-center text-slate-500 text-sm animateFadeInUp" style="animation-delay: 0.2s; animation-fill-mode: both;">
            <p class="tracking-wide">מערכת נתונים כרונולוגית • כל הזכויות שמורות © 2024</p>
        </footer>
    </div>

    <script>
        // ============================================
        // הגדרות - כתובת ה-Web App של Google Apps Script
        // ============================================
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw_1r3-1Haf2GEUwmxaLSjKb7fJJUL_QArBx2NFPymg0-clX3ZDZOVoxUF3ErwwgyJ3oA/exec';

        // ============================================
        // אתחול תאריכים ברירת מחדל
        // ============================================
        (function initializeDefaultDates() {
            var today = new Date();
            var oneYearAgo = new Date(today);
            oneYearAgo.setFullYear(today.getFullYear() - 1);

            var formatDate = function(dateObj) {
                return dateObj.toISOString().split('T')[0];
            };

            document.getElementById('startDate').value = formatDate(oneYearAgo);
            document.getElementById('endDate').value = formatDate(today);
        })();

        // ============================================
        // טיפול בשליחת הטופס
        // ============================================
        document.getElementById('stockForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            var submitBtn = document.getElementById('submitBtn');
            var submitText = document.getElementById('submitText');
            var submitIcon = document.getElementById('submitIcon');
            var loadingSpinner = document.getElementById('loadingSpinner');
            var errorSection = document.getElementById('errorSection');
            var errorMessage = document.getElementById('errorMessage');
            var successSection = document.getElementById('successSection');
            var formSection = document.getElementById('formSection');

            errorSection.classList.add('hidden');
            successSection.classList.add('hidden');

            var rawSymbols = document.getElementById('symbols').value;
            var tickersArray = rawSymbols.split(',')
                .map(function(symbol) { return symbol.trim().toUpperCase(); })
                .filter(function(symbol) { return symbol !== ''; });

            if (tickersArray.length === 0) {
                showError('אנא הזן לפחות סימול מניה אחד');
                return;
            }

            var formData = {
                tickers: tickersArray,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value,
            };

            // מעבר למצב טעינה עם מיקרו-אינטראקציה
            submitBtn.disabled = true;
            submitText.textContent = 'מייצר דוח, נא להמתין...';
            submitText.classList.add('animate-pulse');
            submitIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            try {
                var response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(formData),
                });

                if (!response.ok) {
                    throw new Error('שגיאת שרת (HTTP ' + response.status + ')');
                }

                var data = await response.json();

                if (data.status === "error") {
                    throw new Error(data.message || 'שגיאה בעיבוד הנתונים');
                }

                var sheetUrl = data.sheetUrl;
                if (!sheetUrl) {
                    throw new Error('לא התקבלה כתובת גיליון מהשרת');
                }

                document.getElementById('openSheetBtn').href = sheetUrl;
                
                formSection.classList.add('hidden');
                successSection.classList.remove('hidden');

            } catch (error) {
                showError('אופס, משהו השתבש: ' + error.message);
                console.error('Fetch error:', error);
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = 'התחל ניתוח נתונים';
                submitText.classList.remove('animate-pulse');
                submitIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorSection.classList.remove('hidden');
            }
        });

        // ============================================
        // כפתור חזרה
        // ============================================
        document.getElementById('resetBtn').addEventListener('click', function() {
            var formSection = document.getElementById('formSection');
            var successSection = document.getElementById('successSection');

            successSection.classList.add('hidden');
            formSection.classList.remove('hidden');

            formSection.style.animation = 'none';
            formSection.offsetHeight; 
            formSection.style.animation = 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        });

        // המרה בזמן אמת לאותיות גדולות
        document.getElementById('symbols').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
    </script>
</body>
</html>
