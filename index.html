<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניתוח מניות - דאשבורד חכם</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        finance: {
                            900: '#060B14',
                            800: '#0A1222',
                            700: '#14213D',
                            600: '#1E3A5F',
                            500: '#1D4ED8',
                            400: '#3B82F6',
                            300: '#60A5FA',
                            accent: '#00F0FF',
                        }
                    },
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/heebo@5.0.19/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fira-code@5.0.19/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/he.js"></script>

    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); } 50% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.7); } }
        
        .animateFadeInUp { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animateSlideDown { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animatePulseGlow { animation: pulseGlow 2.5s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A1222; }
        ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 10px; }

        /* ========================================================
           עיצוב מותאם ללוח השנה (Flatpickr) - הכל בלבן קריא!
           ======================================================== */
        .flatpickr-calendar {
            background: rgba(10, 18, 34, 0.95) !important;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6) !important;
            font-family: 'Heebo', sans-serif !important;
            direction: rtl !important;
        }
        
        /* אזור עליון: חודש, שנה וחצים */
        .flatpickr-months,
        .flatpickr-current-month,
        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            color: #ffffff !important;
        }
        .flatpickr-months .flatpickr-prev-month svg, 
        .flatpickr-months .flatpickr-next-month svg {
            fill: #ffffff !important;
        }
        .flatpickr-months .flatpickr-prev-month:hover svg, 
        .flatpickr-months .flatpickr-next-month:hover svg {
            fill: #00F0FF !important; 
        }
        
        /* כותרות ימים (א', ב', ג'...) */
        span.flatpickr-weekday { color: #60A5FA !important; font-weight: bold !important; }
        
        /* ימי החודש הרגילים */
        .flatpickr-day { color: #ffffff !important; border-radius: 8px !important; }
        
        /* ימים מחודש קודם/הבא (אפור עדין) */
        .flatpickr-day.flatpickr-disabled,
        .flatpickr-day.prevMonthDay, 
        .flatpickr-day.nextMonthDay { color: #64748b !important; }
        
        /* מעבר עכבר ויום נבחר */
        .flatpickr-day:hover, .flatpickr-day:focus { background: rgba(30, 58, 95, 0.8) !important; border-color: transparent !important; }
        .flatpickr-day.selected { background: #00F0FF !important; color: #060B14 !important; border: none !important; font-weight: bold !important; }
        .flatpickr-day.today { border-color: #3B82F6 !important; }
        
        /* עיצוב פאנל זכוכית כללי */
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-finance-900 text-slate-200 font-sans min-h-screen overflow-x-hidden">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 -left-10 w-96 h-96 bg-finance-500/20 rounded-full mix-blend-screen filter blur-[80px] opacity-70 animate-blob"></div>
        <div class="absolute top-20 -right-10 w-96 h-96 bg-finance-accent/20 rounded-full mix-blend-screen filter blur-[80px] opacity-70 animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute -bottom-20 left-40 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-screen filter blur-[80px] opacity-60 animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-12">

        <header class="text-center mb-10 animateFadeInUp">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-finance-800/80 border border-finance-500/30 mb-6 shadow-2xl">
                <svg class="w-10 h-10 text-finance-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold text-white tracking-tight mb-4">שלום, ברוך הבא</h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">מערכת הניתוח מוכנה. הזן את המניות המבוקשות לקבלת דוח נתונים כרונולוגי מאוחד.</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 animateFadeInUp" style="animation-delay: 0.1s;">
            <div class="glass-panel p-4 rounded-2xl flex justify-between items-center shadow-lg">
                <div><p class="text-slate-500 text-xs font-bold">S&P 500</p><p class="text-white font-mono text-xl">5,234.1</p></div>
                <div class="text-emerald-400 text-sm font-bold bg-emerald-500/10 px-2 py-1 rounded-lg">+1.1%</div>
            </div>
            <div class="glass-panel p-4 rounded-2xl flex justify-between items-center shadow-lg">
                <div><p class="text-slate-500 text-xs font-bold">NASDAQ</p><p class="text-white font-mono text-xl">16,396.8</p></div>
                <div class="text-emerald-400 text-sm font-bold bg-emerald-500/10 px-2 py-1 rounded-lg">+0.8%</div>
            </div>
            <div class="glass-panel p-4 rounded-2xl flex justify-between items-center shadow-lg">
                <div><p class="text-slate-500 text-xs font-bold">ת"א 35</p><p class="text-white font-mono text-xl">2,031.5</p></div>
                <div class="text-red-400 text-sm font-bold bg-red-500/10 px-2 py-1 rounded-lg">-0.2%</div>
            </div>
        </div>

        <main id="formSection" class="animateFadeInUp" style="animation-delay: 0.2s;">
            <form id="stockForm" class="glass-panel rounded-3xl p-6 sm:p-10 space-y-8 shadow-2xl relative overflow-visible">
                
                <div class="relative">
                    <label for="symbols" class="block text-sm font-bold text-slate-300 mb-2">סימולי מניות</label>
                    <input type="text" id="symbols" name="symbols" placeholder="AAPL, TSLA, MSFT..." required class="w-full px-6 py-4 bg-finance-900/50 border border-slate-700/50 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-finance-accent/50 font-mono tracking-widest transition-all">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <div class="relative group">
                        <label class="block text-sm font-bold text-slate-300 mb-2">תאריך התחלה</label>
                        <div class="absolute left-4 bottom-4 text-slate-500 group-hover:text-finance-accent transition-colors z-10 pointer-events-none"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg></div>
                        <input type="text" id="startDate" name="startDate" required class="w-full pl-12 pr-4 py-4 bg-finance-900/50 border border-slate-700/50 rounded-2xl text-white cursor-pointer focus:outline-none focus:border-finance-accent">
                    </div>
                    <div class="relative group">
                        <label class="block text-sm font-bold text-slate-300 mb-2">תאריך סיום</label>
                        <div class="absolute left-4 bottom-4 text-slate-500 group-hover:text-finance-accent transition-colors z-10 pointer-events-none"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg></div>
                        <input type="text" id="endDate" name="endDate" required class="w-full pl-12 pr-4 py-4 bg-finance-900/50 border border-slate-700/50 rounded-2xl text-white cursor-pointer focus:outline-none focus:border-finance-accent">
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-bold text-slate-300 mb-2">תדירות</label>
                        <input type="hidden" id="frequency" value="1d">
                        <div id="customSelectBtn" class="w-full px-5 py-4 bg-finance-900/50 border border-slate-700/50 rounded-2xl text-white flex justify-between items-center cursor-pointer hover:border-finance-accent transition-all">
                            <span id="customSelectText">יומי (Daily)</span>
                            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2"/></svg>
                        </div>
                        <div id="customSelectList" class="absolute left-0 right-0 mt-2 bg-finance-800 border border-white/10 rounded-2xl shadow-2xl hidden z-50">
                            <div class="p-4 hover:bg-finance-700 cursor-pointer rounded-t-2xl custom-option" data-value="1d">יומי (Daily)</div>
                            <div class="p-4 hover:bg-finance-700 cursor-pointer custom-option" data-value="1wk">שבועי (Weekly)</div>
                            <div class="p-4 hover:bg-finance-700 cursor-pointer rounded-b-2xl custom-option" data-value="1mo">חודשי (Monthly)</div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-finance-400 to-finance-accent text-finance-900 font-black text-xl rounded-2xl shadow-lg hover:shadow-finance-accent/30 transition-all transform hover:-translate-y-1 active:scale-95 flex justify-center items-center gap-3">
                    <svg id="submitIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
                    <svg id="loadingSpinner" class="hidden w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span>הפק ניתוח שוק</span>
                </button>
            </form>

            <div id="errorSection" class="hidden mt-6 animateSlideDown">
                <div class="bg-red-900/30 border border-red-500/50 rounded-2xl p-5 text-red-200 flex items-center gap-4">
                    <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                    <p id="errorMessage"></p>
                </div>
            </div>
        </main>

        <section id="successSection" class="hidden animateFadeInUp mt-8 space-y-6">
            <div class="glass-panel rounded-3xl p-8 overflow-hidden shadow-2xl">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-3">
                        <div class="bg-finance-accent/20 p-2 rounded-xl"><svg class="w-6 h-6 text-finance-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
                        תצוגה מקדימה (5 שורות ראשונות)
                    </h3>
                    <a id="openSheetBtn" href="#" target="_blank" class="px-6 py-3 bg-emerald-500 text-finance-900 font-bold rounded-xl shadow-lg hover:bg-emerald-400 transition-all flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        פתיחת הגיליון המלא
                    </a>
                </div>
                
                <div class="overflow-x-auto rounded-xl border border-white/5">
                    <table class="w-full text-right bg-black/20">
                        <thead id="previewThead" class="bg-white/5 text-slate-400 text-xs font-mono"></thead>
                        <tbody id="previewTbody" class="text-white text-sm font-mono"></tbody>
                    </table>
                </div>
                
                <div class="mt-8 pt-8 border-t border-white/5 text-center">
                    <button id="resetBtn" class="text-slate-500 hover:text-white flex items-center gap-2 mx-auto font-bold transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        ניתוח חדש
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwH0143gyxYlyGhxRAhMpQgzuEGPuYH_SKMGF1NGxbcEUxTeVlYjvK5zbEDbgQq3HRGzA/exec';

        // הגדרת לוח שנה Flatpickr - נוספה האפשרות להקליד ידנית!
        const fpConfig = { 
            locale: "he", 
            dateFormat: "Y-m-d", 
            disableMobile: true,
            allowInput: true // <-- זה מה שמאפשר לך להקליד תאריך ידנית 
        };
        flatpickr("#startDate", { ...fpConfig, defaultDate: new Date(new Date().setFullYear(new Date().getFullYear() - 1)) });
        flatpickr("#endDate", { ...fpConfig, defaultDate: new Date() });

        // לוגיקה של Custom Select
        const selectBtn = document.getElementById('customSelectBtn');
        const selectList = document.getElementById('customSelectList');
        selectBtn.onclick = (e) => { e.stopPropagation(); selectList.classList.toggle('hidden'); };
        document.querySelectorAll('.custom-option').forEach(opt => {
            opt.onclick = (e) => {
                document.getElementById('frequency').value = opt.dataset.value;
                document.getElementById('customSelectText').innerText = opt.innerText;
                selectList.classList.add('hidden');
            };
        });
        window.onclick = () => selectList.classList.add('hidden');

        // שליחת הטופס
        document.getElementById('stockForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const errorSection = document.getElementById('errorSection');
            const successSection = document.getElementById('successSection');
            const formSection = document.getElementById('formSection');

            errorSection.classList.add('hidden');
            
            const tickers = document.getElementById('symbols').value.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
            const formData = {
                tickers,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            if (new Date(formData.startDate) > new Date(formData.endDate)) {
                showError("שגיאה: תאריך ההתחלה לא יכול להיות מאוחר מתאריך הסיום.");
                return;
            }

            submitBtn.disabled = true;
            document.getElementById('submitIcon').classList.add('hidden');
            document.getElementById('loadingSpinner').classList.remove('hidden');

            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(formData) });
                const data = await res.json();
                
                if (data.status === "error") throw new Error(data.message);

                // בניית תצוגה מקדימה לטבלה
                if (data.preview && data.preview.length > 0) {
                    let hHtml = '<tr>', bHtml = '';
                    data.preview[0].forEach(h => hHtml += `<th class="p-4 border-b border-white/5">${h}</th>`);
                    data.preview.slice(1).forEach(row => {
                        bHtml += '<tr class="border-b border-white/5 hover:bg-white/5 transition-colors">';
                        row.forEach(cell => bHtml += `<td class="p-4">${typeof cell === 'number' ? cell.toFixed(2) : cell}</td>`);
                        bHtml += '</tr>';
                    });
                    document.getElementById('previewThead').innerHTML = hHtml + '</tr>';
                    document.getElementById('previewTbody').innerHTML = bHtml;
                }

                document.getElementById('openSheetBtn').href = data.sheetUrl;
                formSection.classList.add('hidden');
                successSection.classList.remove('hidden');
            } catch (err) {
                showError(err.message);
            } finally {
                submitBtn.disabled = false;
                document.getElementById('submitIcon').classList.remove('hidden');
                document.getElementById('loadingSpinner').classList.add('hidden');
            }
        };

        function showError(msg) {
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorSection').classList.remove('hidden');
        }

        document.getElementById('resetBtn').onclick = () => {
            document.getElementById('successSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
        };

        document.getElementById('symbols').oninput = function() { this.value = this.value.toUpperCase(); };
    </script>
</body>
</html>
